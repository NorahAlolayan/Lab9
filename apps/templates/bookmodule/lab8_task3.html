<!DOCTYPE html>
<html>
<head>
    <title>Lab8 Task3</title>
</head>
<body>

<h2>Books with edition ≤ 3 and do not contain 'qu'</h2>

{% if books %}
    <ul>
        {% for book in books %}
            <li>
                {{ book.title }} | {{ book.author }} | {{ book.price }} | {{ book.edition }}
            </li>
        {% endfor %}
    </ul>
{% else %}
    <p>No books found</p>
{% endif %}

</body>
</html>
