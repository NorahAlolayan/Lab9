<!DOCTYPE html>
<html>
<head>
    <title>Lab 9 Task 3</title>
</head>
<body>
    <h1>Oldest Book for Each Publisher</h1>

    <table border="1">
        <tr>
            <th>Publisher Name</th>
            <th>Location</th>
            <th>Oldest Book Title</th>
            <th>Publication Date</th>
        </tr>

        {% for item in data %}
        <tr>
            <td>{{ item.publisher_name }}</td>
            <td>{{ item.location }}</td>
            <td>{{ item.oldest_book_title }}</td>
            <td>{{ item.oldest_pubdate }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
