<!DOCTYPE html>
<html>
<head>
    <title>Lab 9 Task 6</title>
</head>
<body>
    <h1>Filtered Books Count for Each Publisher</h1>

    <table border="1">
        <tr>
            <th>Publisher Name</th>
            <th>Location</th>
            <th>Filtered Books Count</th>
        </tr>

        {% for publisher in publishers %}
        <tr>
            <td>{{ publisher.name }}</td>
            <td>{{ publisher.location }}</td>
            <td>{{ publisher.filtered_books_count }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
